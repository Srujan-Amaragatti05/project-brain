version: '1.0'
llm:
  provider: ollama
  model: 'phi3'
  timeout_sec: 60
analysis:
  depth: fast
  include_tests: true
  ignore:
  - .brain/
  - .git/
  - node_modules/
  - venv/
  - .venv/
  - __pycache__/
  - env/
  - .env/
  - '*.egg-info/'
  - src/
diff:
  mode: file
export:
  full_code:
    include_tests: false
    max_file_size_kb: 200
  manual_add:
    allow_duplicates: false
  changes:
    mode: file
    include_context: true
    output_path: .brain/exports/code_changes.txt
explain:
  level: detailed
  include_risks: false
output:
  format: json
