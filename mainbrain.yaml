version: '1.0'
llm:
  provider: 'gemini'
  model: 'gemini-flash-lite-latest'
  api_key: 'AIzaSyBFeEFpWe82e7VLZUKm3susjWf70dRM6r8'
  timeout_sec: 60
analysis:
  depth: fast
  include_tests: false
  ignore:
  - .brain/
  - .brainmain/
  - cache/
  - .git/
  - node_modules/
  - venv/
  - .venv/
  - __pycache__/
  - env/
  - .env/
  - '*.egg-info/'
  - tests/
  - project_brain.egg-info/
diff:
  mode: function
export:
  full_code:
    include_tests: false
    max_file_size_kb: 200
  manual_add:
    allow_duplicates: true
  changes:
    mode: function
    include_context: true
    output_path: .brain/exports/code_changes.txt
explain:
  level: detailed
  include_risks: true
output:
  format: text
