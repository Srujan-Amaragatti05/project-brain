version: '1.0'
llm:
  provider: ollama
  model: 'phi3'
  timeout_sec: 60
explain:
  level: detailed
  include_risks: true
analysis:
  depth: fast
  include_tests: false
  ignore:
  - .brain/
  - .git/
  - node_modules/
  - venv/
  - .venv/
  - __pycache__/
  - env/
  - .env/
  - '*.egg-info/'
diff:
  mode: function
export:
  full_code:
    include_tests: false
    max_file_size_kb: 200
  manual_add:
    allow_duplicates: true
  changes:
    mode: function
    include_context: true
    output_path: .brain/exports/code_changes.txt
output:
  format: text
